{% extends 'base.html' %}

{% block content %}
<section class="card form-card">
    <div class="card">
        <h2>Stroke Risk Assessment</h2>
        <p>Answer the questions below for an accurate and fast likelihood estimate. Your inputs are used to calculate risk and provide tailored advice.</p>
    </div>

    {% if error %}
        <p class="error-message">{{ error }}</p>
    {% endif %}

    <form method="POST" class="form">
        <div class="form-group">
            <label for="gender">Gender</label>
            <select name="gender" id="gender" required>
                <option value="">Choose one</option>
                <option value="0">Male</option>
                <option value="1">Female</option>
                <option value="2">Other</option>
            </select>
        </div>
        <div class="form-group">
            <label for="age">Age</label>
            <input type="number" name="age" id="age" min="0" max="120" placeholder="Enter your age" required>
        </div>
        <div class="form-group">
            <label for="hypertension">Hypertension</label>
            <select name="hypertension" id="hypertension" required>
                <option value="">Choose one</option>
                <option value="0">No</option>
                <option value="1">Yes</option>
            </select>
        </div>
        <div class="form-group">
            <label for="heart_disease">Heart Disease</label>
            <select name="heart_disease" id="heart_disease" required>
                <option value="">Choose one</option>
                <option value="0">No</option>
                <option value="1">Yes</option>
            </select>
        </div>
        <div class="form-group">
            <label for="ever_married">Ever Married</label>
            <select name="ever_married" id="ever_married" required>
                <option value="">Choose one</option>
                <option value="0">No</option>
                <option value="1">Yes</option>
            </select>
        </div>
        <div class="form-group">
            <label for="work_type">Work Type</label>
            <select name="work_type" id="work_type" required>
                <option value="">Choose one</option>
                <option value="0">Children</option>
                <option value="1">Government Job</option>
                <option value="2">Never Worked</option>
                <option value="3">Private</option>
                <option value="4">Self-employed</option>
            </select>
        </div>
        <div class="form-group">
            <label for="Residence_type">Residence Type</label>
            <select name="Residence_type" id="Residence_type" required>
                <option value="">Choose one</option>
                <option value="0">Rural</option>
                <option value="1">Urban</option>
            </select>
        </div>
        <div class="form-group">
            <label for="avg_glucose_level">Average Glucose Level</label>
            <input type="number" step="0.1" name="avg_glucose_level" id="avg_glucose_level" placeholder="e.g., 85.5" required>
        </div>
        <div class="form-group">
            <label for="bmi">Body Mass Index (BMI)</label>
            <input type="number" step="0.1" name="bmi" id="bmi" placeholder="e.g., 24.7" required>
        </div>
        <div class="form-group">
            <label for="smoking_status">Smoking Status</label>
            <select name="smoking_status" id="smoking_status" required>
                <option value="">Choose one</option>
                <option value="0">Unknown</option>
                <option value="1">Formerly Smoked</option>
                <option value="2">Never Smoked</option>
                <option value="3">Smokes</option>
            </select>
        </div>
        <button type="submit" class="btn">Predict Risk</button>
    </form>
</section>
{% endblock %}
